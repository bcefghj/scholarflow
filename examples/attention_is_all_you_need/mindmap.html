<script>
const md = "# Attention Is All You Need\n\n## 1. \u7814\u7a76\u80cc\u666f\u4e0e\u52a8\u673a\n### 1.1 RNN\u7684\u5c40\u9650\u6027\n#### \u987a\u5e8f\u8ba1\u7b97\u963b\u788d\u5e76\u884c\u5316\n#### \u957f\u8ddd\u79bb\u4f9d\u8d56\u5b66\u4e60\u56f0\u96be\n#### \u8ba1\u7b97\u590d\u6742\u5ea6O(n)\n### 1.2 \u6ce8\u610f\u529b\u673a\u5236\u7684\u4f18\u52bf\n#### \u53ef\u6355\u6349\u4efb\u610f\u8ddd\u79bb\u4f9d\u8d56\n#### \u4fbf\u4e8e\u5e76\u884c\u8ba1\u7b97\n### 1.3 \u6838\u5fc3\u521b\u65b0\n#### \u63d0\u51faTransformer\u67b6\u6784\n#### \u5b8c\u5168\u57fa\u4e8e\u6ce8\u610f\u529b\u673a\u5236\n#### \u6452\u5f03\u5faa\u73af\u548c\u5377\u79ef\n\n## 2. \u6a21\u578b\u67b6\u6784\n### 2.1 \u6574\u4f53\u7ed3\u6784\n#### Encoder-Decoder\u6846\u67b6\n#### \u5806\u53e0\u5f0f\u8bbe\u8ba1(N=6\u5c42)\n### 2.2 \u7f16\u7801\u5668(Encoder)\n#### Multi-Head Self-Attention\u5c42\n#### Position-wise Feed-Forward\u5c42\n#### \u6b8b\u5dee\u8fde\u63a5\n#### \u5c42\u5f52\u4e00\u5316\n#### \u8f93\u51fa\u7ef4\u5ea6dmodel=512\n### 2.3 \u89e3\u7801\u5668(Decoder)\n#### Masked Self-Attention\u5c42\n#### Encoder-Decoder Attention\u5c42\n#### Position-wise Feed-Forward\u5c42\n#### \u9632\u6b62\u4fe1\u606f\u6cc4\u9732\n### 2.4 \u6ce8\u610f\u529b\u673a\u5236\n#### 2.4.1 Scaled Dot-Product Attention\n##### \u8ba1\u7b97Q\u3001K\u3001V\u77e9\u9635\n##### \u7f29\u653e\u56e0\u5b501/\u221adk\n##### Softmax\u6743\u91cd\u8ba1\u7b97\n##### \u516c\u5f0f: softmax(QKT/\u221adk)V\n#### 2.4.2 Multi-Head Attention\n##### \u5e76\u884ch=8\u4e2a\u6ce8\u610f\u529b\u5934\n##### \u6295\u5f71\u5230dk=dv=64\u7ef4\n##### \u62fc\u63a5\u540e\u7ebf\u6027\u53d8\u6362\n##### \u6355\u83b7\u591a\u5b50\u7a7a\u95f4\u4fe1\u606f\n#### 2.4.3 \u4e09\u79cd\u5e94\u7528\u65b9\u5f0f\n##### Encoder\u81ea\u6ce8\u610f\u529b\n##### Decoder\u81ea\u6ce8\u610f\u529b(\u5e26mask)\n##### Encoder-Decoder\u6ce8\u610f\u529b\n### 2.5 \u524d\u9988\u795e\u7ecf\u7f51\u7edc\n#### \u4e24\u4e2a\u7ebf\u6027\u53d8\u6362\n#### ReLU\u6fc0\u6d3b\n#### \u5185\u90e8\u7ef4\u5ea6dff=2048\n### 2.6 \u4f4d\u7f6e\u7f16\u7801\n#### \u8865\u5145\u5e8f\u5217\u4f4d\u7f6e\u4fe1\u606f\n#### \u6b63\u5f26/\u4f59\u5f26\u51fd\u6570\n#### \u53ef\u5b66\u4e60\u7684Embedding\u7248\u672c\n\n## 3. \u81ea\u6ce8\u610f\u529b\u4f18\u52bf\u5206\u6790\n### 3.1 \u8ba1\u7b97\u590d\u6742\u5ea6\n#### Self-Attention: O(n\u00b2\u00b7d)\n#### Recurrent: O(n\u00b7d\u00b2)\n### 3.2 \u5e76\u884c\u5316\u7a0b\u5ea6\n#### Self-Attention: O(1)\n#### Recurrent: O(n)\n### 3.3 \u6700\u5927\u8def\u5f84\u957f\u5ea6\n#### Self-Attention: O(1)\n#### Recurrent: O(n)\n### 3.4 \u53ef\u89e3\u91ca\u6027\n#### \u6ce8\u610f\u529b\u53ef\u89c6\u5316\n#### \u53e5\u6cd5\u7ed3\u6784\u6355\u6349\n\n## 4. \u8bad\u7ec3\u914d\u7f6e\n### 4.1 \u6570\u636e\u96c6\n#### WMT 2014 English-German\n##### 450\u4e07\u53e5\u5b50\u5bf9\n##### BPE\u7f16\u7801\n##### 37000\u8bcd\u8868\n#### WMT 2014 English-French\n##### 3600\u4e07\u53e5\u5b50\u5bf9\n##### 32000\u8bcd\u8868\n### 4.2 \u786c\u4ef6\n#### 8 NVIDIA P100 GPUs\n#### Base\u6a21\u578b: 12\u5c0f\u65f6\n#### Big\u6a21\u578b: 3.5\u5929\n### 4.3 \u4f18\u5316\u5668\n#### Adam\u4f18\u5316\u5668\n#### \u03b2\u2081=0.9, \u03b2\u2082=0.98\n#### \u5b66\u4e60\u7387\u9884\u70ed\u7b56\u7565\n#### warmup_steps=4000\n### 4.4 \u6b63\u5219\u5316\n#### \u6b8b\u5deeDropout (Pdrop=0.1)\n#### \u6807\u7b7e\u5e73\u6ed1 (\u03b5ls=0.1)\n\n## 5. \u5b9e\u9a8c\u7ed3\u679c\n### 5.1 \u673a\u5668\u7ffb\u8bd1\n#### English-German\n##### BLEU: 28.4 (\u6700\u4f73)\n##### \u8d85\u8d8a\u6240\u6709\u96c6\u6210\u6a21\u578b\n#### English-French\n##### BLEU: 41.8 (\u6700\u4f73)\n##### \u8bad\u7ec3\u6210\u672c\u964d\u4f4e\n### 5.2 \u6a21\u578b\u53d8\u4f53\u5206\u6790\n#### \u6ce8\u610f\u529b\u5934\u6570\u91cf\u5f71\u54cd\n#### Key\u7ef4\u5ea6\u5f71\u54cd\n#### \u6a21\u578b\u6df1\u5ea6\u5f71\u54cd\n#### Dropout\u6548\u679c\n#### \u4f4d\u7f6e\u7f16\u7801\u5bf9\u6bd4\n### 5.3 \u53e5\u6cd5\u5206\u6790\n#### English Constituency Parsing\n##### WSJ\u8bad\u7ec3\u96c6\n##### \u534a\u76d1\u7763\u5b66\u4e60\n##### F1: 92.7\n##### \u8d85\u8d8a\u591a\u6570RNN\u6a21\u578b\n\n## 6. \u7ed3\u8bba\u4e0e\u5c55\u671b\n### 6.1 \u6838\u5fc3\u8d21\u732e\n#### \u9996\u4e2a\u7eaf\u6ce8\u610f\u529b\u6a21\u578b\n#### \u5e76\u884c\u5316\u8bad\u7ec3\n#### SOTA\u7ffb\u8bd1\u6027\u80fd\n### 6.2 \u672a\u6765\u65b9\u5411\n#### \u591a\u6a21\u6001\u6269\u5c55\n#### \u5c40\u90e8\u6ce8\u610f\u529b\u673a\u5236\n#### \u56fe\u50cf/\u97f3\u9891\u5904\u7406";
const { Transformer } = markmap;
const transformer = new Transformer();
const { root } = transformer.transform(md);
const { Markmap } = markmap;
Markmap.create('#mindmap', null, root);
</script>
