# Attention Is All You Need
## 1. 摘要
### Transformer架构
### 基于注意力机制
### 放弃循环和卷积
## 2. 引言
### 2.1 循环神经网络的局限性
#### 顺序计算限制并行化
#### 长距离依赖学习困难
#### 内存约束限制批处理
### 2.2 注意力机制的发展
#### 无视距离建模依赖
#### 通常与RNN结合使用
### 2.3 Transformer的提出
#### 纯注意力机制
#### 可并行化程度高
#### 训练时间显著减少
## 3. 背景
### 3.1 相关工作
#### Neural GPU
#### ByteNet
#### ConvS2S
### 3.2 自注意力机制
#### 关联同一序列不同位置
#### 用于阅读理解、摘要、文本蕴含等任务
### 3.3 端到端记忆网络
#### 基于循环注意力机制
## 4. 模型架构
### 4.1 编码器
#### 6层相同结构堆叠
#### 多头自注意力层
#### 位置前馈网络层
#### 残差连接
#### 层归一化
#### 输出维度 dmodel=512
### 4.2 解码器
#### 6层相同结构堆叠
#### 掩码多头自注意力层
#### 编码器-解码器注意力层
#### 位置前馈网络层
#### 防止向左信息流动
### 4.3 注意力机制
#### 4.3.1 缩放点积注意力
##### Query、Key、Value向量
##### 公式: softmax(QK^T/√dk)V
##### 防止大dk时梯度消失
#### 4.3.2 多头注意力
##### h=8个并行注意力头
##### dk=dv=dmodel/h=64
##### 捕获不同表示子空间
#### 4.3.3 应用方式
##### 编码器-解码器注意力
##### 编码器自注意力
##### 解码器自注意力
### 4.4 位置前馈网络
#### 两层线性变换
#### ReLU激活
#### 内层维度 dff=2048
#### 等价于kernel=1的卷积
### 4.5 嵌入和Softmax
#### 输入输出token嵌入
#### 共享权重矩阵
#### 嵌入权重乘以√dmodel
### 4.6 位置编码
#### 注入序列位置信息
#### 维度dmodel与嵌入相同
#### 正弦和余弦函数
#### 可学习的替代方案
#### 支持超出训练长度的泛化
## 5. 为什么使用自注意力
### 5.1 计算复杂度对比
#### 自注意力: O(n²·d)
#### 循环: O(n·d²)
#### 卷积: O(k·n·d²)
### 5.2 并行化程度
#### 自注意力: O(1)
#### 循环: O(n)
### 5.3 最大路径长度
#### 自注意力: O(1)
#### 循环: O(n)
### 5.4 可解释性优势
#### 注意力分布可视化
#### 不同头学习不同任务
## 6. 训练
### 6.1 数据和批处理
#### WMT 2014 英德: 450万句子对
#### WMT 2014 英法: 3600万句子对
#### 字节对编码
#### 约25000 token/批
### 6.2 硬件和训练时间
#### 8块 NVIDIA P100 GPU
#### 基础模型: 12小时/10万步
#### 大模型: 3.5天/30万步
### 6.3 优化器
#### Adam优化器
#### β1=0.9, β2=0.98, ε=10⁻⁹
#### 学习率调度
##### 预热阶段线性增长
##### 之后逆平方根衰减
##### warmup_steps=4000
### 6.4 正则化
#### 残差Dropout
##### Pdrop=0.1
##### 子层输出和嵌入后应用
#### 标签平滑
##### εls=0.1
## 7. 实验结果
### 7.1 机器翻译
#### 7.1.1 英德翻译
##### BLEU: 28.4
##### 超之前最好结果2+ BLEU
##### 优于集成模型
#### 7.1.2 英法翻译
##### BLEU: 41.8
##### 单模型最优
##### 训练成本1/4于竞争模型
#### 7.1.3 训练成本对比
##### 显著低于其他模型
##### 约2.3-3.3×10¹⁸ FLOPs
### 7.2 模型变体实验
#### 7.2.1 注意力头数影响
##### 头数过多或过少性能下降
##### 单头注意力差0.9 BLEU
#### 7.2.2 键维度影响
##### dk减小损害模型质量
##### 点积兼容性函数待改进
#### 7.2.3 模型规模影响
##### 大模型更好
##### dropout防止过拟合
#### 7.2.4 位置编码对比
##### 学习位置编码≈正弦编码
### 7.3 英文成分句法分析
#### 7.3.1 WSJ数据集
##### 仅WSJ训练集: F1=91.3
##### 半监督: F1=92.7
#### 7.3.2 超越Berkeley Parser
#### 7.3.3 任务无关调优
## 8. 结论
### 8.1 核心贡献
#### 首个纯注意力序列转导模型
#### 训练速度显著提升
#### 多项任务达到最优
### 8.2 未来方向
#### 扩展到其他模态
#### 局部受限注意力机制
#### 处理图像、音频、视频
#### 减少生成序列性
